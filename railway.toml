[build]
builder = "NIXPACKS"

[env]
NIXPACKS_NODE_VERSION = "20"

[phases.setup]
aptPkgs = ["python3", "build-essential"]

[phases.install]
cmds = ["rm -rf package-lock.json node_modules", "npm install", "npm rebuild better-sqlite3"]

[deploy]
startCommand = "npm rebuild better-sqlite3 && node index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
